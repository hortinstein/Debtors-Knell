name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "webapp/**"
      - "archive/**"
      - "scripts/**"
      - "prices/**"
      - "staticsite/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let an in-flight one finish rather
# than cancelling it mid-upload.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r webapp/requirements.txt
          pip install -r staticsite/requirements.txt

      - name: Freeze static site
        run: python3 staticsite/freeze.py staticsite/build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: staticsite/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
