name: Fetch daily card prices

on:
  schedule:
    # 09:23 UTC daily - comfortably after GoatBots' 05:30 CET/CEST publish
    # time and MTGJSON's daily refresh, off the top-of-hour to avoid
    # GitHub Actions' busiest scheduling minute.
    - cron: "23 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: fetch-prices
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements-prices.txt

      - name: Install headless Chromium (for GoatBots' Cloudflare challenge)
        run: python -m playwright install --with-deps chromium

      - name: Fetch and archive today's prices
        run: python scripts/fetch_prices.py

      # uuid -> card-name map that lets build_price_history.py join the
      # archived MTGJSON snapshots into per-deck USD series. No-op unless the
      # map is missing or a month old; committed below with the rest of
      # prices/.
      - name: Refresh MTGJSON uuid-to-name map
        run: python scripts/build_mtgjson_uuid_map.py

      - name: Record today's date
        run: echo "PRICE_DATE=$(date -u +%Y-%m-%d)" >> "$GITHUB_ENV"

      - name: Commit archived prices
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Archive card prices for ${{ env.PRICE_DATE }}"
          file_pattern: "prices/**"

      # The auto-commit above is pushed with the workflow's GITHUB_TOKEN, and
      # GitHub suppresses push-triggered workflows for such pushes -- so the
      # deploy-pages.yml "on: push: paths: prices/**" trigger never fires for
      # it. workflow_dispatch created via the API is the documented exception,
      # so kick the Pages rebuild explicitly whenever new prices landed.
      - name: Rebuild GitHub Pages with the new prices
        if: steps.commit.outputs.changes_detected == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main --repo "$GITHUB_REPOSITORY"
